<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dragon7 Pro</title>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:-apple-system;
  margin:0;
}
.container{
  max-width:430px;
  margin:auto;
  padding:14px;
}
h2{
  text-align:center;
}
.card{
  background:#1e293b;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}
.stat{
  font-size:18px;
  margin:5px 0;
}
.big{
  font-size:26px;
  font-weight:700;
}
.green{color:#22c55e;}
.red{color:#ef4444;}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
button{
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#334155;
  color:#fff;
}
button:active{
  transform:scale(0.97);
}
.wide{
  grid-column:span 3;
}
.tools{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:10px;
}
.log{
  max-height:260px;
  overflow:auto;
  font-size:14px;
}
.row{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:6px 0;
}
.small{
  font-size:14px;
  color:#cbd5e1;
}
</style>

</head>
<body>

<div class="container">

<h2>Dragon7 Pro</h2>

<div class="card">
<div class="stat">RC: <span id="rc">0</span></div>
<div class="stat">TC: <span id="tc">0</span></div>
<div class="stat big" id="bet">NO BET (0)</div>
<div class="stat">下注: <span id="unit">0</span></div>

<div class="stat">已出牌: <span id="total">0</span></div>
<div class="stat">剩餘張數: <span id="remain">416</span></div>
<div class="stat">剩餘副數: <span id="deck">8.00</span></div>
</div>

<div class="card">
<div>本手牌</div>
<div class="small" id="current">無</div>
</div>

<div class="card">
<div>戰績</div>
<div class="stat">總手數: <span id="handCount">0</span></div>
<div class="stat">命中: <span id="hitCount">0</span></div>
<div class="stat">盈虧: <span id="profit">0</span></div>
</div>

<div class="grid">
<button data-card="1">A</button>
<button data-card="2">2</button>
<button data-card="3">3</button>
<button data-card="4">4</button>
<button data-card="5">5</button>
<button data-card="6">6</button>
<button data-card="7">7</button>
<button data-card="8">8</button>
<button data-card="9">9</button>
<button data-card="10" class="wide">10/JQK</button>
</div>

<div class="tools">
<button id="end">結束此手</button>
<button id="undo">復原</button>
<button id="reset">新一靴</button>
</div>

<div class="card">
<div>紀錄</div>
<div class="log" id="log"></div>
</div>

</div>

<script>

let cards = [];
let currentHand = [];
let logs = [];
let totalProfit = 0;
let totalHits = 0;

function value(c){
  if([4,5,6,7].includes(c)) return -1;
  if([8,9].includes(c)) return 2;
  return 0;
}

// ✅ 改這裡（核心）
function getUnit(tc){
  if(tc >= 4) return 1;
  return 0;
}

function label(c){
  return c===1?"A":c;
}

function update(){
  let rc = cards.reduce((a,b)=>a+value(b),0);
  let remain = 416 - cards.length;
  let deck = remain/52;
  let tc = deck>0 ? Math.floor(rc/deck) : 0;
  let unit = getUnit(tc);
  let bet = unit>0 ? "BET":"NO BET";

  document.getElementById("rc").innerText = rc;
  document.getElementById("tc").innerText = tc;
  document.getElementById("bet").innerText = bet+" ("+unit+")";
  document.getElementById("bet").className = unit>0?"stat big green":"stat big red";
  document.getElementById("unit").innerText = unit;

  document.getElementById("total").innerText = cards.length;
  document.getElementById("remain").innerText = remain;
  document.getElementById("deck").innerText = deck.toFixed(2);

  document.getElementById("current").innerText =
    currentHand.length?currentHand.map(label).join(", "):"無";

  document.getElementById("handCount").innerText = logs.length;
  document.getElementById("hitCount").innerText = totalHits;
  document.getElementById("profit").innerText = totalProfit;
}

function renderLogs(){
  document.getElementById("log").innerHTML =
    logs.map((x,i)=>`
      <div class="row">
        <div>
          #${i+1} ${x.cards}<br>
          <span class="small">TC:${x.tc}｜下注:${x.unit}</span>
        </div>
        <div class="${x.pnl>=0?"green":"red"}">
          ${x.pnl>=0?"+":""}${x.pnl}
        </div>
      </div>
    `).join("");
}

document.querySelectorAll("[data-card]").forEach(btn=>{
  btn.onclick=()=>{
    let c=Number(btn.dataset.card);
    cards.push(c);
    currentHand.push(c);
    update();
  }
});

document.getElementById("end").onclick=()=>{
  if(currentHand.length===0) return;

  let rc = cards.reduce((a,b)=>a+value(b),0);
  let remain = 416 - cards.length;
  let deck = remain/52;
  let tc = deck>0 ? Math.floor(rc/deck) : 0;
  let unit = getUnit(tc);

  let hit=false;
  if(unit>0){
    hit = prompt("1=中龍七, 0=未中","0")==="1";
  }

  let pnl = unit>0 ? (hit?unit*40:-unit):0;

  if(hit) totalHits++;
  totalProfit += pnl;

  logs.push({
    cards: currentHand.map(label).join(", "),
    tc, unit, pnl
  });

  currentHand=[];
  renderLogs();
  update();
};

document.getElementById("undo").onclick=()=>{
  cards.pop();
  currentHand.pop();
  update();
};

document.getElementById("reset").onclick=()=>{
  cards=[];currentHand=[];logs=[];
  totalProfit=0;totalHits=0;
  renderLogs();
  update();
};

renderLogs();
update();

</script>

</body>
</html>
